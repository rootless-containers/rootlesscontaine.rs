<header class="gdoc-header">
    <div class="container flex align-center justify-between">
        <div class="flex align-center">
            {{ if .MenuEnabled }}
            <label for="menu-control" class="gdoc-nav__control">
                <svg class="icon menu"><use xlink:href="#menu"></use></svg>
                <svg class="icon arrow-back"><use xlink:href="#arrow_back"></use></svg>
            </label>
            {{ end }}
            <a class="gdoc-header__link" href="{{ .Root.Site.BaseURL }}">
                <span class="gdoc-brand flex align-center">
                    <img class="gdoc-brand__img" src="{{ (default "brand.svg" .Root.Site.Params.GeekdocLogo) | relURL }}" alt="{{ .Root.Site.Title }}" width=38 height=38>
                    {{ .Root.Site.Title }}
                </span>
            </a>
        </div>

        {{ $repo := default (default false .Root.Site.Params.GeekdocRepo) .Root.Page.Params.GeekdocRepo }}
        {{ if $repo }}
        <a class="gdoc-header__link" href="{{ $repo }}" target="_blank" rel="noopener" aria-label="GitHub">
            <svg class="icon github" style="height: 1.5rem; width: 1.5rem; fill: currentColor;">
                <use xlink:href="#github"></use>
            </svg>
        </a>
        {{ end }}
    </div>
</header>
